name: Pinact

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
  pull_request:
    paths:
      - ".github/**"

jobs:
  verify:
    name: Verify action versions are pinned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: suzuki-shunsuke/pinact-action@1d0277bfd498e11194013e1f83097c4bb498f47a # v1.1.0
        with:
          verify: true
